<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OAAB</title>
<script>
(function () {
  var match = location.pathname.match(/^\/releases\/([^\/?#]+)\/?$/);
  if (match) {
    var version = match[1];
    try { version = decodeURIComponent(version); } catch (e) {}
    location.replace('/releases#' + encodeURIComponent(version));
  }
})();
</script>
</head>
<body>
<main>
  <h1>Page not found</h1>
  <p><a href="/">Return to OAAB</a></p>
</main>
</body>
</html>
